<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Shopkeep{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#253345',
              surface: '#2E2669',
              s2:      '#443E97',
              s3:      '#443E97',
              border:  '#443E97',
              brite:   '#A749A0',
              indigo:  '#443E97',
              blue:    '#A749A0',
              lindigo: '#E58B8B',
              lblue:   '#DF8090',
              text:    '#CED5DE',
              muted:   '#8C9AAD',
              dim:     '#8C9AAD',
            }
          },
          fontFamily: {
            display: ['Avita', 'sans-serif'],
            body: ['Avita', 'sans-serif'],
            mono: ['Avita', 'sans-serif'],
            mochibop: ['Mochibop', 'serif'],
          }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='fonts/Mochibop-Demo.ttf') }}") format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='fonts/MochibopBold-Demo.ttf') }}") format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='fonts/Avita-RoundedThin.otf') }}") format('opentype');
      font-weight: 100 500;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='fonts/Avita-RoundedBlack.otf') }}") format('opentype');
      font-weight: 600 900;
    }
    body { font-family: 'Avita', sans-serif; }
    .font-mochibop { font-family: 'Mochibop', serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #253345;
      background-image: radial-gradient(ellipse 100% 50% at 50% -20%, rgba(167, 73, 160, 0.15) 0%, transparent 60%);
      min-height: 100vh;
      color: #CED5DE;
    }
    .main-nav {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(37, 51, 69, 0.92);
      border-bottom: 1px solid #443E97;
    }
    .btn-primary {
      background: #443E97;
      border: 1px solid rgba(68, 62, 151, 0.4);
      transition: all 0.15s ease;
      display: inline-block;
    }
    .btn-primary:hover {
      background: #2E2669;
      box-shadow: 0 0 0 3px rgba(68, 62, 151, 0.3);
    }
    .divider { height: 1px; background: #443E97; }
    .card {
      background: #2E2669;
      border: 1px solid #443E97;
      border-radius: 16px;
    }
    .back-link {
      color: #8C9AAD;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #CED5DE; }
    code {
      font-family: 'Avita', sans-serif;
      font-size: 0.85em;
      background: #2E2669;
      border: 1px solid #443E97;
      padding: 0.1em 0.45em;
      border-radius: 4px;
      color: #DF8090;
    }
    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body class="font-body text-sk-text antialiased" style="font-weight:450">
{% block body %}{% endblock %}
</body>
</html>
