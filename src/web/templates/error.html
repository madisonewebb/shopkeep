<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong - Shopkeep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#253345',
              surface: '#2E2669',
              s2:      '#443E97',
              s3:      '#443E97',
              border:  '#443E97',
              brite:   '#A749A0',
              indigo:  '#443E97',
              blue:    '#A749A0',
              lindigo: '#E58B8B',
              lblue:   '#DF8090',
              text:    '#CED5DE',
              muted:   '#8C9AAD',
              dim:     '#8C9AAD',
            }
          },
          fontFamily: {
            display: ['Avita', 'sans-serif'],
            body: ['Avita', 'sans-serif'],
            mono: ['Avita', 'sans-serif'],
            mochibop: ['Mochibop', 'serif'],
          }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='Mochibop-Demo.ttf') }}") format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='MochibopBold-Demo.ttf') }}") format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedThin.otf') }}") format('opentype');
      font-weight: 100 500;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedBlack.otf') }}") format('opentype');
      font-weight: 600 900;
    }
    body { font-family: 'Avita', sans-serif; }
    .font-mochibop { font-family: 'Mochibop', serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #253345;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239, 68, 68, 0.08) 0%, transparent 60%);
      min-height: 100vh;
      color: #CED5DE;
    }
    .card {
      background: #2E2669;
      border: 1px solid #443E97;
      border-radius: 16px;
    }
    .error-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-link {
      color: #8C9AAD;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #CED5DE; }
  </style>
</head>
<body class="font-body text-sk-text antialiased" style="font-weight:450">

  <div class="min-h-screen flex flex-col">
    <header class="py-4 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/"><img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="h-10 w-10 rounded-xl"></a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <div class="error-dot mb-6">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 5V8.5" stroke="#f87171" stroke-width="1.75" stroke-linecap="round"/>
            <circle cx="8" cy="11.5" r="1" fill="#f87171"/>
          </svg>
        </div>
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-3">Error</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">Something went wrong</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">{{ message }}</p>
        <a href="/" class="back-link">&larr; Back to home</a>
      </div>
    </main>
  </div>

</body>
</html>
