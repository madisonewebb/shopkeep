<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#FDF8F2',
              surface: '#F7EFE3',
              s2:      '#EFE3D0',
              s3:      '#E6D4BC',
              border:  '#DCCFBC',
              brite:   '#C8A882',
              indigo:  '#D4635A',
              blue:    '#4A3B8C',
              lindigo: '#E8A09A',
              lblue:   '#9B8DC4',
              text:    '#2A1F16',
              muted:   '#7A6858',
              dim:     '#B09A84',
            }
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #FDF8F2;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(239, 68, 68, 0.08) 0%, transparent 60%);
      min-height: 100vh;
    }
    .card {
      background: #F7EFE3;
      border: 1px solid #DCCFBC;
      border-radius: 16px;
    }
    .error-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-link {
      color: #8b8baf;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #2A1F16; }
  </style>
</head>
<body class="font-body text-sk-text antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/" class="font-display font-semibold text-sk-text text-base tracking-tight">Shopkeep</a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <div class="error-dot mb-6">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 5V8.5" stroke="#f87171" stroke-width="1.75" stroke-linecap="round"/>
            <circle cx="8" cy="11.5" r="1" fill="#f87171"/>
          </svg>
        </div>
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-3">Error</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">Something went wrong</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">{{ message }}</p>
        <a href="/" class="back-link">&larr; Back to home</a>
      </div>
    </main>
  </div>

</body>
</html>
