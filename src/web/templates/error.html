<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Something went wrong — Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/output.css') }}" rel="stylesheet">
  <script>document.documentElement.setAttribute("data-theme",localStorage.getItem("theme")||"winter");</script>
</head>
<body class="font-body antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center px-6 border-b border-base-300 bg-base-100">
      <div class="flex-1"></div>
      <a href="/" class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="w-10 h-10 rounded-xl">
        <span class="font-display font-bold text-base-content text-base">Shopkeep</span>
      </a>
      <div class="flex-1 flex justify-end">
        <button id="theme-toggle" class="btn btn-ghost btn-sm btn-square" aria-label="Toggle theme">
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364-.707.707M6.343 17.657l-.707.707M17.657 6.343l-.707.707M6.343 6.343l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
      </button>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16 bg-base-200">
      <div class="card bg-base-100 border border-base-300 shadow-sm w-full max-w-sm">
        <div class="card-body gap-5">
          <div class="w-10 h-10 rounded-full bg-error/10 border border-error/25 flex items-center justify-center text-error">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 5V8.5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
              <circle cx="8" cy="11.5" r="1" fill="currentColor"/>
            </svg>
          </div>
          <div>
            <span class="badge badge-error badge-outline font-semibold mb-3 px-3 py-2 h-auto text-xs">Error</span>
            <h1 class="font-display font-bold text-2xl tracking-tight text-base-content">Something went wrong</h1>
          </div>
          <p class="text-sm text-base-content/60 leading-relaxed font-medium">{{ message }}</p>
          <a href="/" class="text-sm text-primary hover:text-primary/80 transition-colors mt-1 font-semibold">&larr; Back to home</a>
        </div>
      </div>
    </main>
  </div>

<script>
  (function(){
    var btn=document.getElementById("theme-toggle");
    var sun=document.getElementById("icon-sun");
    var moon=document.getElementById("icon-moon");
    function apply(t){
      document.documentElement.setAttribute("data-theme",t);
      localStorage.setItem("theme",t);
      if(sun)sun.classList.toggle("hidden",t!=="shopkeep-dark");
      if(moon)moon.classList.toggle("hidden",t==="shopkeep-dark");
    }
    apply(localStorage.getItem("theme")||"winter");
    if(btn)btn.addEventListener("click",function(){
      apply(document.documentElement.getAttribute("data-theme")==="shopkeep-dark"?"winter":"shopkeep-dark");
    });
  })();
</script>
</body>
</html>
