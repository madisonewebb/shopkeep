<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Shopkeep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#253345',
              surface: '#2E2669',
              s2:      '#443E97',
              s3:      '#443E97',
              border:  '#443E97',
              brite:   '#A749A0',
              indigo:  '#443E97',
              blue:    '#A749A0',
              lindigo: '#E58B8B',
              lblue:   '#DF8090',
              text:    '#CED5DE',
              muted:   '#8C9AAD',
              dim:     '#8C9AAD',
            }
          },
          fontFamily: {
            display: ['Avita', 'sans-serif'],
            body: ['Avita', 'sans-serif'],
            mono: ['Avita', 'sans-serif'],
            mochibop: ['Mochibop', 'serif'],
          }
        }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='Mochibop-Demo.ttf') }}") format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='MochibopBold-Demo.ttf') }}") format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedThin.otf') }}") format('opentype');
      font-weight: 100 500;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedBlack.otf') }}") format('opentype');
      font-weight: 600 900;
    }
    body { font-family: 'Avita', sans-serif; }
    .font-mochibop { font-family: 'Mochibop', serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #253345;
      background-image: radial-gradient(ellipse 100% 60% at 50% -20%, rgba(167, 73, 160, 0.18) 0%, transparent 60%);
      min-height: 100vh;
      color: #CED5DE;
    }
    .back-link {
      color: #8C9AAD;
      font-size: 0.875rem;
      transition: color 0.15s;
    }
    .back-link:hover { color: #CED5DE; }
    .meme-frame {
      background: #2E2669;
      border: 1px solid #443E97;
      border-radius: 16px;
      overflow: hidden;
    }
  </style>
</head>
<body class="font-body text-sk-text antialiased" style="font-weight:450">

  <div class="min-h-screen flex flex-col">
    <header class="py-4 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/"><img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="h-10 w-10"></a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="w-full max-w-sm text-center">
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-6">404</p>
        <div class="meme-frame mb-6">
          <img src="/static/this_is_fine-sal.png" alt="Sal the shopkeep sitting in a burning room: this is fine" class="w-full">
        </div>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">This is fine.</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">That page doesn't exist, but Sal's handling it with grace.</p>
        <a href="/" class="back-link">&larr; Back to home</a>
      </div>
    </main>
  </div>

</body>
</html>
