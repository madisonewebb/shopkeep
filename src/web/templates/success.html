<!DOCTYPE html>
<html lang="en" data-theme="shopkeep">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Nunito:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['Nunito', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    [data-theme="shopkeep"] {
      color-scheme: light;
      --p: oklch(0.50 0.13 292);
      --pf: oklch(0.43 0.14 292);
      --pc: oklch(0.97 0.01 292);
      --s: oklch(0.71 0.10 22);
      --sf: oklch(0.64 0.11 22);
      --sc: oklch(0.97 0.01 22);
      --a: oklch(0.54 0.18 355);
      --af: oklch(0.47 0.18 355);
      --ac: oklch(0.97 0.01 355);
      --n: oklch(0.28 0.07 265);
      --nf: oklch(0.23 0.07 265);
      --nc: oklch(0.95 0.01 265);
      --b1: oklch(0.98 0.008 55);
      --b2: oklch(0.94 0.012 55);
      --b3: oklch(0.90 0.016 55);
      --bc: oklch(0.28 0.08 292);
      --in: oklch(0.70 0.14 240);
      --inc: oklch(0.97 0.01 240);
      --su: oklch(0.72 0.13 152);
      --suc: oklch(0.25 0.05 152);
      --wa: oklch(0.80 0.14 72);
      --wac: oklch(0.25 0.05 72);
      --er: oklch(0.64 0.18 22);
      --erc: oklch(0.97 0.01 22);
      --rounded-box: 1.25rem;
      --rounded-btn: 0.75rem;
      --rounded-badge: 1.9rem;
    }
    body {
      background-image: radial-gradient(ellipse 80% 50% at 70% -10%, oklch(0.71 0.10 22 / 0.18) 0%, transparent 55%),
                        radial-gradient(ellipse 60% 40% at 10% 100%, oklch(0.50 0.13 292 / 0.10) 0%, transparent 50%);
    }
    code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  </style>
</head>
<body class="font-body antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-base-300 bg-base-100/85 backdrop-blur-lg">
      <a href="/" class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="w-8 h-8 rounded-full">
        <span class="font-display font-semibold text-base-content text-base tracking-tight">Shopkeep</span>
      </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card bg-base-100 shadow-md w-full max-w-sm">
        <div class="card-body gap-4">
          <div class="w-9 h-9 rounded-full bg-success/15 border border-success/30 flex items-center justify-center">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 8L7 12L13 5" stroke="oklch(0.72 0.13 152)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="font-mono text-xs text-primary/60 tracking-widest uppercase font-semibold">Connected</p>
          <h1 class="font-display font-bold text-2xl tracking-tight text-base-content">{{ shop_name }} is live</h1>
          <p class="text-sm text-base-content/60 leading-relaxed font-medium">
            Shopkeep is monitoring your Etsy shop. Finish setup in Discord with these commands.
          </p>
          <div class="grid gap-2 mt-2">
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-xl">
              <code class="text-primary font-semibold">/setchannel</code>
              <span class="text-xs text-base-content/50 font-semibold">Pick where notifications go</span>
            </div>
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-xl">
              <code class="text-primary font-semibold">/shop</code>
              <span class="text-xs text-base-content/50 font-semibold">View shop info</span>
            </div>
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-xl">
              <code class="text-primary font-semibold">/orders</code>
              <span class="text-xs text-base-content/50 font-semibold">List recent orders</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
