<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#18110A',
              surface: '#221810',
              s2:      '#2C1F14',
              s3:      '#36271A',
              border:  '#4A3526',
              brite:   '#6B5040',
              indigo:  '#E07B72',
              blue:    '#A090CC',
              lindigo: '#F0AFA8',
              lblue:   '#C4B8E0',
              text:    '#F5EDD8',
              muted:   '#A89070',
              dim:     '#6B5040',
            }
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #18110A;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224, 123, 114, 0.10) 0%, transparent 60%);
      min-height: 100vh;
    }
    .card {
      background: #221810;
      border: 1px solid #4A3526;
      border-radius: 16px;
    }
    .success-dot {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cmd-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #2C1F14;
      border: 1px solid #4A3526;
      border-radius: 8px;
    }
    .cmd-row code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #C4B8E0;
    }
  </style>
</head>
<body class="font-body text-sk-text antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/" class="font-display font-semibold text-sk-text text-base tracking-tight">Shopkeep</a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <div class="success-dot mb-6">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8L7 12L13 5" stroke="#34d399" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-3">Connected</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">{{ shop_name }} is live</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">
          Shopkeep is monitoring your Etsy shop. Finish setup in Discord with these commands.
        </p>
        <div class="grid gap-2">
          <div class="cmd-row">
            <code>/setchannel</code>
            <span class="text-xs text-sk-muted">Pick where notifications go</span>
          </div>
          <div class="cmd-row">
            <code>/shop</code>
            <span class="text-xs text-sk-muted">View shop info</span>
          </div>
          <div class="cmd-row">
            <code>/orders</code>
            <span class="text-xs text-sk-muted">List recent orders</span>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
