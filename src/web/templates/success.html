<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connected - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['Figtree', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    code { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  </style>
</head>
<body class="font-body antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-base-200 bg-base-100">
      <a href="/" class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="w-8 h-8 rounded-full">
        <span class="font-display font-semibold text-base-content text-base tracking-tight">Shopkeep</span>
      </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card bg-base-100 shadow-md w-full max-w-sm">
        <div class="card-body gap-4">
          <div class="w-9 h-9 rounded-full bg-success/10 border border-success/25 flex items-center justify-center">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 8L7 12L13 5" stroke="oklch(var(--su))" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="font-mono text-xs text-base-content/40 tracking-widest uppercase">Connected</p>
          <h1 class="font-display font-bold text-2xl tracking-tight text-base-content">{{ shop_name }} is live</h1>
          <p class="text-sm text-base-content/60 leading-relaxed">
            Shopkeep is monitoring your Etsy shop. Finish setup in Discord with these commands.
          </p>
          <div class="grid gap-2 mt-2">
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-lg">
              <code class="text-primary font-medium">/setchannel</code>
              <span class="text-xs text-base-content/50">Pick where notifications go</span>
            </div>
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-lg">
              <code class="text-primary font-medium">/shop</code>
              <span class="text-xs text-base-content/50">View shop info</span>
            </div>
            <div class="flex items-center gap-3 p-2.5 px-3 bg-base-200 rounded-lg">
              <code class="text-primary font-medium">/orders</code>
              <span class="text-xs text-base-content/50">List recent orders</span>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
