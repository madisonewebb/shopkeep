<!DOCTYPE html>
<html lang="en" data-theme="winter">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect your Etsy shop - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['Figtree', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
</head>
<body class="font-body antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-base-200 bg-base-100">
      <a href="/" class="flex items-center gap-2">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="w-8 h-8 rounded-full">
        <span class="font-display font-semibold text-base-content text-base tracking-tight">Shopkeep</span>
      </a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16 bg-base-50">
      <div class="card bg-base-100 shadow-md w-full max-w-sm">
        <div class="card-body gap-4">
          <p class="font-mono text-xs text-base-content/40 tracking-widest uppercase">Setup</p>
          <h1 class="font-display font-bold text-2xl tracking-tight text-base-content">Connect your Etsy shop</h1>
          <p class="text-sm text-base-content/60 leading-relaxed">
            {% if guild_name %}Setting up Shopkeep for <strong class="text-base-content font-medium">{{ guild_name }}</strong>. {% endif %}Authorize Shopkeep to read orders from your Etsy account.
          </p>
          <form method="post" class="mt-2">
            <button type="submit" class="btn btn-primary w-full">Authorize with Etsy</button>
          </form>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
