<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect your Etsy shop - Shopkeep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#253345',
              surface: '#2E2669',
              s2:      '#443E97',
              s3:      '#443E97',
              border:  '#443E97',
              brite:   '#A749A0',
              indigo:  '#443E97',
              blue:    '#A749A0',
              lindigo: '#E58B8B',
              lblue:   '#DF8090',
              text:    '#CED5DE',
              muted:   '#8C9AAD',
              dim:     '#8C9AAD',
            }
          },
          fontFamily: {
            display: ['Avita', 'sans-serif'],
            body: ['Avita', 'sans-serif'],
            mono: ['Avita', 'sans-serif'],
            mochibop: ['Mochibop', 'serif'],
          }
      }
    }
  </script>
  <style>
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='Mochibop-Demo.ttf') }}") format('truetype');
      font-weight: 400;
    }
    @font-face {
      font-family: 'Mochibop';
      src: url("{{ url_for('static', filename='MochibopBold-Demo.ttf') }}") format('truetype');
      font-weight: 700;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedThin.otf') }}") format('opentype');
      font-weight: 100 500;
    }
    @font-face {
      font-family: 'Avita';
      src: url("{{ url_for('static', filename='Avita-RoundedBlack.otf') }}") format('opentype');
      font-weight: 600 900;
    }
    body { font-family: 'Avita', sans-serif; }
    .font-mochibop { font-family: 'Mochibop', serif; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #253345;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(167, 73, 160, 0.18) 0%, transparent 60%);
      min-height: 100vh;
      color: #CED5DE;
    }
    .card {
      background: #2E2669;
      border: 1px solid #443E97;
      border-radius: 16px;
    }
    .btn-primary {
      background: #443E97;
      border: 1px solid rgba(68, 62, 151, 0.4);
      transition: all 0.15s ease;
      display: block;
      width: 100%;
      text-align: center;
    }
    .btn-primary:hover {
      background: #3a347f;
      box-shadow: 0 0 0 3px rgba(68, 62, 151, 0.3);
    }
  </style>
</head>
<body class="font-body text-sk-text antialiased" style="font-weight:450">

  <div class="min-h-screen flex flex-col">
    <header class="py-4 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/"><img src="{{ url_for('static', filename='logo.png') }}" alt="Shopkeep" class="h-10 w-10 rounded-xl"></a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-5">Setup</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">Connect your Etsy shop</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">
          {% if guild_name %}Setting up Shopkeep for <strong class="text-sk-text font-medium">{{ guild_name }}</strong>. {% endif %}Authorize Shopkeep to read orders from your Etsy account.
        </p>
        <form method="post">
          <button type="submit" class="btn-primary font-semibold text-white py-2.5 rounded-lg text-sm">
            Authorize with Etsy
          </button>
        </form>
      </div>
    </main>
  </div>

</body>
</html>
