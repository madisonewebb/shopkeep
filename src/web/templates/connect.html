<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect your Etsy shop — Shopkeep</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f6f2; color: #333; }
    .card { max-width: 480px; margin: 80px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 2px 16px rgba(0,0,0,.08); }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 32px; line-height: 1.5; }
    .btn { display: block; width: 100%; margin-top: 24px; padding: 12px; border: none; border-radius: 8px; background: #e8623a; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connect your Etsy shop</h1>
    <p class="subtitle">
      {% if guild_name %}Setting up Shopkeep for <strong>{{ guild_name }}</strong>.{% endif %}
      Click below to authorize Shopkeep with your Etsy account.
    </p>

    <form method="post">
      <button type="submit" class="btn">Authorize with Etsy →</button>
    </form>
  </div>
</body>
</html>
