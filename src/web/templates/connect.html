<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect your Etsy shop - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Figtree:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg: '#07070f',
              surface: '#0f0f1a',
              s2: '#16162a',
              s3: '#1e1e33',
              border: '#252540',
              brite: '#3b3b6e',
              indigo: '#6366f1',
              blue: '#3b82f6',
              lindigo: '#a5b4fc',
              lblue: '#93c5fd',
              text: '#f0f0ff',
              muted: '#8b8baf',
              dim: '#4a4a72',
            }
          },
          fontFamily: {
            display: ['"Bricolage Grotesque"', 'sans-serif'],
            body: ['Figtree', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #07070f;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
      min-height: 100vh;
    }
    .card {
      background: #0f0f1a;
      border: 1px solid #252540;
      border-radius: 16px;
    }
    .btn-primary {
      background: #6366f1;
      border: 1px solid rgba(165, 180, 252, 0.2);
      transition: all 0.15s ease;
      display: block;
      width: 100%;
      text-align: center;
    }
    .btn-primary:hover {
      background: #818cf8;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
    }
  </style>
</head>
<body class="font-body text-sk-text antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/" class="font-display font-semibold text-sk-text text-base tracking-tight">Shopkeep</a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-5">Setup</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">Connect your Etsy shop</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">
          {% if guild_name %}Setting up Shopkeep for <strong class="text-sk-text font-medium">{{ guild_name }}</strong>. {% endif %}Authorize Shopkeep to read orders from your Etsy account.
        </p>
        <form method="post">
          <button type="submit" class="btn-primary font-semibold text-white py-2.5 rounded-lg text-sm">
            Authorize with Etsy
          </button>
        </form>
      </div>
    </main>
  </div>

</body>
</html>
