<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect your Etsy shop - Shopkeep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sk: {
              bg:      '#18110A',
              surface: '#221810',
              s2:      '#2C1F14',
              s3:      '#36271A',
              border:  '#4A3526',
              brite:   '#6B5040',
              indigo:  '#E07B72',
              blue:    '#A090CC',
              lindigo: '#F0AFA8',
              lblue:   '#C4B8E0',
              text:    '#F5EDD8',
              muted:   '#A89070',
              dim:     '#6B5040',
            }
          },
          fontFamily: {
            display: ['Fraunces', 'serif'],
            body: ['"DM Sans"', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #18110A;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(224, 123, 114, 0.12) 0%, transparent 60%);
      min-height: 100vh;
      color: #F5EDD8;
    }
    .card {
      background: #221810;
      border: 1px solid #4A3526;
      border-radius: 16px;
    }
    .btn-primary {
      background: #E07B72;
      border: 1px solid rgba(240, 175, 168, 0.25);
      transition: all 0.15s ease;
      display: block;
      width: 100%;
      text-align: center;
    }
    .btn-primary:hover {
      background: #D4635A;
      box-shadow: 0 0 0 3px rgba(224, 123, 114, 0.25);
    }
  </style>
</head>
<body class="font-body text-sk-text antialiased">

  <div class="min-h-screen flex flex-col">
    <header class="h-14 flex items-center justify-center px-6 border-b border-sk-border">
      <a href="/" class="font-display font-semibold text-sk-text text-base tracking-tight">Shopkeep</a>
    </header>

    <main class="flex-1 flex items-center justify-center px-6 py-16">
      <div class="card w-full max-w-sm p-8">
        <p class="font-mono text-xs text-sk-dim tracking-widest uppercase mb-5">Setup</p>
        <h1 class="font-display font-bold text-2xl tracking-tight mb-3">Connect your Etsy shop</h1>
        <p class="text-sm text-sk-muted leading-relaxed mb-7">
          {% if guild_name %}Setting up Shopkeep for <strong class="text-sk-text font-medium">{{ guild_name }}</strong>. {% endif %}Authorize Shopkeep to read orders from your Etsy account.
        </p>
        <form method="post">
          <button type="submit" class="btn-primary font-semibold text-white py-2.5 rounded-lg text-sm">
            Authorize with Etsy
          </button>
        </form>
      </div>
    </main>
  </div>

</body>
</html>
