# One-time setup — apply manually with cluster-admin credentials:
#   kubectl apply -f manifests/pvc.yaml
# Excluded from kustomization intentionally: CI does not have PVC permissions
# and recreating this would destroy the SQLite database.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shopkeep-data
  namespace: shopkeep
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
