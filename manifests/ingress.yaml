apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopkeep-web
  namespace: shopkeep
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
  - host: shopkeepbot.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shopkeep-web
            port:
              number: 80
  - host: www.shopkeepbot.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: shopkeep-web
            port:
              number: 80
