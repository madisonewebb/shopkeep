apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopkeep-bot
  namespace: shopkeep
  labels:
    app: shopkeep-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopkeep-bot
  template:
    metadata:
      labels:
        app: shopkeep-bot
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: bot
        image: ghcr.io/madisonewebb/shopkeep:latest
        imagePullPolicy: Always
        env:
        - name: DISCORD_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: shopkeep-secrets
              key: DISCORD_BOT_TOKEN
        - name: ETSY_API_KEY
          valueFrom:
            secretKeyRef:
              name: shopkeep-secrets
              key: ETSY_API_KEY
        - name: ETSY_SHARED_SECRET
          valueFrom:
            secretKeyRef:
              name: shopkeep-secrets
              key: ETSY_SHARED_SECRET
        - name: WEB_BASE_URL
          valueFrom:
            secretKeyRef:
              name: shopkeep-secrets
              key: WEB_BASE_URL
        - name: DISCORD_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: shopkeep-secrets
              key: DISCORD_CLIENT_ID
        - name: POLL_INTERVAL_SECS
          value: "60"
        - name: DB_PATH
          value: "/app/data/shopkeep.db"
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: shopkeep-data
      restartPolicy: Always
