name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/madisonewebb/shopkeep
  MOCK_IMAGE: ghcr.io/madisonewebb/shopkeep-mock-etsy

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bot
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}

      - name: Build and push mock-etsy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.etsy
          push: true
          tags: ${{ env.MOCK_IMAGE }}:latest,${{ env.MOCK_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBECONFIG_DATA }}

      - name: Sync secrets
        run: |
          kubectl create secret generic shopkeep-secrets \
            --from-literal=DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }} \
            --from-literal=ORDER_CHANNEL_ID=${{ secrets.ORDER_CHANNEL_ID }} \
            -n shopkeep \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -k manifests/

      - name: Rollout restart
        run: kubectl rollout restart deployment/shopkeep-bot -n shopkeep

      - name: Wait for rollout
        run: kubectl rollout status deployment/shopkeep-bot -n shopkeep --timeout=120s
