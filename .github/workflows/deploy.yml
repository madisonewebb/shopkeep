name: Deploy

on:
  push:
    branches: [main]

env:
  BOT_IMAGE: ghcr.io/madisonewebb/shopkeep
  WEB_IMAGE: ghcr.io/madisonewebb/shopkeep-web

jobs:
  build-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bot
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.BOT_IMAGE }}:latest,${{ env.BOT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.BOT_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.BOT_IMAGE }}:cache,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.WEB_IMAGE }}:latest,${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.WEB_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.WEB_IMAGE }}:cache,mode=max

  deploy:
    needs: [build-bot, build-web]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBECONFIG_DATA }}

      - name: Sync secrets
        run: |
          kubectl create secret generic shopkeep-secrets \
            --from-literal=DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }} \
            --from-literal=ETSY_API_KEY=${{ secrets.ETSY_API_KEY }} \
            --from-literal=ETSY_SHARED_SECRET=${{ secrets.ETSY_SHARED_SECRET }} \
            --from-literal=ETSY_WEB_REDIRECT_URI=${{ secrets.ETSY_WEB_REDIRECT_URI }} \
            --from-literal=DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }} \
            --from-literal=WEB_BASE_URL=${{ secrets.WEB_BASE_URL }} \
            -n shopkeep \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -k manifests/

      - name: Deploy images
        run: |
          kubectl set image deployment/shopkeep-bot \
            bot=${{ env.BOT_IMAGE }}:${{ github.sha }} -n shopkeep
          kubectl set image deployment/shopkeep-web \
            web=${{ env.WEB_IMAGE }}:${{ github.sha }} -n shopkeep

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/shopkeep-bot -n shopkeep --timeout=120s
          kubectl rollout status deployment/shopkeep-web -n shopkeep --timeout=120s
