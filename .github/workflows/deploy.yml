name: Deploy

on:
  push:
    branches: [main]

env:
  BOT_IMAGE: ghcr.io/madisonewebb/shopkeep
  WEB_IMAGE: ghcr.io/madisonewebb/shopkeep-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bot
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.BOT_IMAGE }}:latest,${{ env.BOT_IMAGE }}:${{ github.sha }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ env.WEB_IMAGE }}:latest,${{ env.WEB_IMAGE }}:${{ github.sha }}

