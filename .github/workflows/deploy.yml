name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/madisonewebb/shopkeep

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.bot
          push: true
          tags: ${{ env.IMAGE }}:latest,${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Apply manifests
        run: kubectl apply -k manifests/

      - name: Rollout restart
        run: kubectl rollout restart deployment/shopkeep-bot -n shopkeep

      - name: Wait for rollout
        run: kubectl rollout status deployment/shopkeep-bot -n shopkeep --timeout=120s
