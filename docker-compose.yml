services:
  mock-etsy-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.etsy
    container_name: shopkeep-mock-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./src/etsy:/app/src/etsy:ro
    networks:
      - shopkeep-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/v3/application/openapi-ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: shopkeep-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ETSY_API_URL=http://mock-etsy-api:5000
      - ETSY_SHOP_ID=${ETSY_SHOP_ID:-12345678}
      - ORDER_CHANNEL_ID=${ORDER_CHANNEL_ID}
      - POLL_INTERVAL_SECS=${POLL_INTERVAL_SECS:-60}
      - DB_PATH=/app/data/shopkeep.db
    volumes:
      - ./src:/app/src:ro
      - shopkeep_data:/app/data
    networks:
      - shopkeep-network
    depends_on:
      mock-etsy-api:
        condition: service_healthy

networks:
  shopkeep-network:
    driver: bridge

volumes:
  shopkeep_data:
