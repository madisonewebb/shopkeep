services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
    container_name: shopkeep-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ETSY_API_KEY=${ETSY_API_KEY}
      - ETSY_SHARED_SECRET=${ETSY_SHARED_SECRET}
      - WEB_BASE_URL=${WEB_BASE_URL}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - POLL_INTERVAL_SECS=${POLL_INTERVAL_SECS:-60}
      - DB_PATH=/app/data/shopkeep.db
    volumes:
      - ./src:/app/src:ro
      - shopkeep_data:/app/data
    networks:
      - shopkeep-network

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: shopkeep-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ETSY_API_KEY=${ETSY_API_KEY}
      - ETSY_SHARED_SECRET=${ETSY_SHARED_SECRET}
      - ETSY_WEB_REDIRECT_URI=${ETSY_WEB_REDIRECT_URI}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - WEB_BASE_URL=${WEB_BASE_URL}
      - DB_PATH=/app/data/shopkeep.db
      - PORT=8080
    volumes:
      - ./src:/app/src:ro
      - shopkeep_data:/app/data
    ports:
      - "8080:8080"
    networks:
      - shopkeep-network

  mock-etsy-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.etsy
    container_name: shopkeep-mock-api
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "5000:5000"
    volumes:
      - ./src/etsy:/app/src/etsy:ro
    networks:
      - shopkeep-network

networks:
  shopkeep-network:
    driver: bridge

volumes:
  shopkeep_data:
