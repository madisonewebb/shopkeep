services:
  mock-etsy-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.etsy
    container_name: shopkeep-mock-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./src/etsy:/app/src/etsy:ro
    networks:
      - shopkeep-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/v3/application/openapi-ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shopkeep-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ETSY_API_URL=http://mock-etsy-api:5000
    volumes:
      - ./src:/app/src:ro
    networks:
      - shopkeep-network
    depends_on:
      mock-etsy-api:
        condition: service_healthy

  # PostgreSQL database (optional - uncomment when ready to use)
  # db:
  #   image: postgres:15-alpine
  #   container_name: shopkeep-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: shopkeep
